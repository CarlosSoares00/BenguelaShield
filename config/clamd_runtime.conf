# BenguelaShield - clamd runtime config
# Em modo frozen, este ficheiro e gerado pelo clamd_service.py
# Em modo dev, e usado directamente com paths relativos
TCPSocket 3310
TCPAddr 127.0.0.1
MaxThreads 4
DatabaseDirectory {db_path}
LogFile {log_path}
LogTime yes
PidFile {pid_path}
Foreground yes
YaraRulesDir {yara_path}
